<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700&amp;display=swap');
            text { font-family: 'Nanum Gothic', sans-serif; text-anchor: middle; }
            .title { font-size: 20px; font-weight: bold; fill: #000000; text-anchor: start; }
            .maker-title { font-size: 16px; font-weight: bold; fill: #011E51; }
            .taker-title { font-size: 16px; font-weight: bold; fill: #F21B2D; }
            .source { font-size: 12px; fill: #727171; text-anchor: end; }
            .shadow { filter: drop-shadow(0px 3px 5px rgba(0,0,0,0.1)); }
        </style>
        <marker id="arrowMaker" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
            <path d="M0,0 L10,5 L0,10 Z" fill="#727171" />
        </marker>
    </defs>
    
    <rect width="100%" height="100%" fill="#FFFFFF" />
    <text x="40" y="40" class="title">가격 메이커와 테이커 층위: 소수가 만들고 다수가 받아쓰는 구조</text>

    <!-- Outer Ring (Price Takers) -->
    <circle cx="400" cy="220" r="160" fill="#FAFAFA" stroke="#F21B2D" stroke-width="2" stroke-dasharray="8,4" />
    
    <text x="400" y="85" class="taker-title">Price Takers (가격 수용 주체)</text>
    <text x="400" y="105" font-size="14px" fill="#F21B2D">다수의 정제소 · 항공사 · 일반 트레이더</text>
    <text x="400" y="125" font-size="12px" fill="#727171">주로 ICE 선물 시장 의존, 실물 괴리 리스크 발생</text>

    <!-- Inner Ring (Price Makers) -->
    <circle cx="400" cy="220" r="100" fill="#F2E9DA" stroke="#011E51" stroke-width="2" class="shadow" />
    
    <text x="400" y="165" class="maker-title">Price Makers (메이커)</text>
    <text x="400" y="183" font-size="12px" fill="#011E51">대형 트레이딩 하우스, 메이저</text>

    <!-- Center (MOC window) -->
    <circle cx="400" cy="260" r="30" fill="#FFFFFF" stroke="#BC9D7E" stroke-width="3" class="shadow" />
    <text x="400" y="258" font-size="12px" font-weight="bold" fill="#000000">MOC</text>
    <text x="400" y="273" font-size="12px" font-weight="bold" fill="#000000">창구</text>

    <!-- DFL Arrow (Left) -->
    <line x1="220" y1="160" x2="310" y2="175" stroke="#727171" stroke-width="3" marker-end="url(#arrowMaker)" />
    <rect x="70" y="140" width="150" height="40" fill="#FFFFFF" rx="4" stroke="#EFEFEF" stroke-width="1" class="shadow" />
    <text x="145" y="157" font-size="14px" font-weight="bold" fill="#011E51">DFL</text>
    <text x="145" y="172" font-size="11px" fill="#727171">Dated vs 선물 간 헤지</text>

    <!-- EFP Arrow (Right) -->
    <line x1="580" y1="160" x2="490" y2="175" stroke="#727171" stroke-width="3" marker-end="url(#arrowMaker)" />
    <rect x="580" y="140" width="140" height="40" fill="#FFFFFF" rx="4" stroke="#EFEFEF" stroke-width="1" class="shadow" />
    <text x="650" y="157" font-size="14px" font-weight="bold" fill="#F21B2D">EFP</text>
    <text x="650" y="172" font-size="11px" fill="#727171">선물을 실물로 전환</text>

    <!-- Description at bottom -->
    <rect x="40" y="320" width="720" height="45" rx="6" fill="#FAFAFA" stroke="#EFEFEF" stroke-width="2" />
    <text x="400" y="338" font-size="14px" font-weight="bold">Dated Brent는 소수의 '가격 메이커'가 창구(MOC)에 찍어낸 값을,</text>
    <text x="400" y="356" font-size="14px" font-weight="bold">다수의 '가격 테이커'가 받아쓰는 비대칭적 구조를 가집니다.</text>

    <!-- Source -->
    <text x="760" y="375" class="source">자료: 코리아PDS</text>
</svg>
