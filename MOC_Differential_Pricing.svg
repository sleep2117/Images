<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="800" height="350">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700&amp;display=swap');
            text { font-family: 'Nanum Gothic', sans-serif; text-anchor: middle; }
            .title { font-size: 20px; font-weight: bold; fill: #000000; text-anchor: start; }
            .baseline { font-size: 18px; font-weight: bold; fill: #727171; letter-spacing: 1px; }
            .bid-text { font-size: 16px; font-weight: bold; fill: #FFFFFF; }
            .offer-text { font-size: 16px; font-weight: bold; fill: #FFFFFF; }
            .diff-value { font-size: 18px; font-weight: bold; }
            .caption { font-size: 16px; font-weight: bold; fill: #000000; }
            .source { font-size: 12px; fill: #727171; text-anchor: end; }
            .shadow { filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.1)); }
        </style>
        <marker id="arrowUpBid" markerWidth="12" markerHeight="12" refX="6" refY="0" orient="auto" markerUnits="strokeWidth">
          <path d="M0,12 L6,0 L12,12 z" fill="#011E51" />
        </marker>
        <marker id="arrowUpOffer" markerWidth="12" markerHeight="12" refX="6" refY="0" orient="auto" markerUnits="strokeWidth">
          <path d="M0,12 L6,0 L12,12 z" fill="#F21B2D" />
        </marker>
    </defs>
    
    <rect width="100%" height="100%" fill="#FFFFFF" />
    <text x="40" y="40" class="title">Differential Pricing in the Window</text>

    <!-- Y-axis guide lines -->
    <line x1="80" y1="90" x2="720" y2="90" stroke="#EFEFEF" stroke-width="2" />
    <line x1="80" y1="155" x2="720" y2="155" stroke="#EFEFEF" stroke-width="2" />

    <!-- Benchmark Baseline -->
    <line x1="80" y1="220" x2="720" y2="220" stroke="#727171" stroke-width="4" stroke-dasharray="8,8" />
    <rect x="250" y="210" width="300" height="20" fill="#FFFFFF" />
    <text x="400" y="226" class="baseline">DATED BRENT BENCHMARK (Base)</text>

    <!-- Trafigura Bid (Left) -->
    <!-- Arrow going up from baseline to 105 -->
    <line x1="250" y1="220" x2="250" y2="115" stroke="#011E51" stroke-width="4" marker-end="url(#arrowUpBid)" />
    
    <rect x="170" y="70" width="160" height="40" rx="4" fill="#011E51" class="shadow" />
    <text x="250" y="96" class="bid-text">TRAFIGURA BID</text>
    <rect x="180" y="125" width="140" height="25" fill="#FFFFFF" opacity="0.8"/>
    <text x="250" y="143" class="diff-value" fill="#011E51">Dated + $2.20</text>

    <!-- Vitol Offer (Right) -->
    <!-- Arrow going up from baseline to 170 -->
    <line x1="550" y1="220" x2="550" y2="180" stroke="#F21B2D" stroke-width="4" marker-end="url(#arrowUpOffer)" />
    
    <rect x="470" y="135" width="160" height="40" rx="4" fill="#F21B2D" class="shadow" />
    <text x="550" y="161" class="offer-text">VITOL OFFER</text>
    <rect x="480" y="190" width="140" height="25" fill="#FFFFFF" opacity="0.8"/>
    <text x="550" y="208" class="diff-value" fill="#F21B2D">Dated + $1.20</text>

    <!-- Caption -->
    <rect x="40" y="270" width="720" height="40" rx="8" fill="#F2E9DA" />
    <text x="400" y="296" class="caption">Dated Brent는 절대 가격이 아니라, 매일 다른 등급의 differential 호가가 얹혀 형성되는 기준선입니다.</text>

    <!-- Source -->
    <text x="760" y="335" class="source">자료: 코리아PDS</text>
</svg>
