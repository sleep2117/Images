<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 650" width="1200" height="650">
  <defs>
    <style>
      text { font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; }
      .title { font-size: 27px; font-weight: 700; fill: #111827; }
      .subtitle { font-size: 15px; fill: #4B5563; }
      .box-title { font-size: 18px; font-weight: 700; fill: #111827; }
      .box-body { font-size: 14px; fill: #374151; }
      .small { font-size: 13px; fill: #64748B; }
      .white { fill: #FFFFFF; }
      .label { font-size: 14px; font-weight: 700; fill: #111827; }
    </style>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,8 L11,4 z" fill="#0F3A5F"/>
    </marker>
    <marker id="arrow-red" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,8 L11,4 z" fill="#F21B2D"/>
    </marker>
    <marker id="arrow-gray" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,8 L11,4 z" fill="#64748B"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#FFFFFF"/>
  <text x="50" y="55" class="title">ICE 선물과 Dated Brent는 이렇게 이어집니다</text>
  <text x="50" y="85" class="subtitle">EFP는 선물과 월 단위 실물을 잇고, CFD는 월 단위 실물을 Dated 가격표로 바꿉니다.</text>

  <rect x="60" y="160" width="220" height="120" rx="16" fill="#EFF6FF" stroke="#2563EB" stroke-width="2"/>
  <text x="170" y="202" text-anchor="middle" class="box-title">ICE Brent 선물</text>
  <text x="170" y="232" text-anchor="middle" class="box-body">거래소 월물 가격</text>
  <text x="170" y="258" text-anchor="middle" class="small">주요 헤지·투기 화면</text>

  <rect x="60" y="395" width="220" height="95" rx="16" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="2"/>
  <text x="170" y="430" text-anchor="middle" class="box-title">ICE Brent Index</text>
  <text x="170" y="460" text-anchor="middle" class="box-body">만기 현금정산 기준값</text>

  <rect x="390" y="160" width="235" height="120" rx="16" fill="#F0FDF4" stroke="#16A34A" stroke-width="2"/>
  <text x="507" y="202" text-anchor="middle" class="box-title">Cash BFOET-M</text>
  <text x="507" y="232" text-anchor="middle" class="box-body">월 단위 실물 Brent</text>
  <text x="507" y="258" text-anchor="middle" class="small">10만 배럴 단위로 가격 발견</text>

  <rect x="735" y="160" width="220" height="120" rx="16" fill="#FFF7ED" stroke="#F97316" stroke-width="2"/>
  <text x="845" y="202" text-anchor="middle" class="box-title">CFD</text>
  <text x="845" y="232" text-anchor="middle" class="box-body">월물과 날짜물의 차이</text>
  <text x="845" y="258" text-anchor="middle" class="small">주 단위 가격표 생성</text>

  <rect x="735" y="385" width="220" height="118" rx="16" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="2"/>
  <text x="845" y="426" text-anchor="middle" class="box-title">MOC 평가</text>
  <text x="845" y="456" text-anchor="middle" class="box-body">16:30 매수·매도 호가</text>
  <text x="845" y="482" text-anchor="middle" class="small">바스켓·정규화 반영</text>

  <rect x="1005" y="250" width="145" height="145" rx="22" fill="#F21B2D"/>
  <text x="1077" y="305" text-anchor="middle" font-size="21" font-weight="700" class="white">Dated</text>
  <text x="1077" y="334" text-anchor="middle" font-size="21" font-weight="700" class="white">Brent</text>
  <text x="1077" y="366" text-anchor="middle" class="small white">실물 기준가격</text>

  <line x1="285" y1="220" x2="380" y2="220" stroke="#0F3A5F" stroke-width="4" marker-end="url(#arrow-blue)"/>
  <text x="332" y="200" text-anchor="middle" class="label">EFP</text>
  <text x="332" y="250" text-anchor="middle" class="small">선물 ↔ 실물 포지션 교환</text>

  <line x1="630" y1="220" x2="725" y2="220" stroke="#F97316" stroke-width="4" marker-end="url(#arrow-gray)"/>
  <text x="677" y="200" text-anchor="middle" class="label">월물 가격</text>

  <line x1="845" y1="285" x2="845" y2="374" stroke="#64748B" stroke-width="4" marker-end="url(#arrow-gray)"/>
  <text x="890" y="332" class="small">주 단위 기준선</text>

  <line x1="960" y1="444" x2="1000" y2="350" stroke="#F21B2D" stroke-width="4" marker-end="url(#arrow-red)"/>
  <text x="985" y="430" text-anchor="middle" class="small">가장 경쟁적 가격</text>

  <line x1="170" y1="290" x2="170" y2="385" stroke="#64748B" stroke-width="3" stroke-dasharray="8 7" marker-end="url(#arrow-gray)"/>
  <text x="205" y="342" class="small">만기 정산</text>

  <line x1="280" y1="445" x2="388" y2="270" stroke="#64748B" stroke-width="3" stroke-dasharray="8 7" marker-end="url(#arrow-gray)"/>
  <text x="345" y="372" class="small">Index는 월 단위 실물 시장 반영</text>

  <path d="M1005 305 C930 285, 925 120, 725 120 C500 120, 390 115, 280 170" fill="none" stroke="#94A3B8" stroke-width="3" stroke-dasharray="8 8"/>
  <text x="810" y="112" text-anchor="middle" class="small">DFL은 Dated와 선물의 차이를 직접 거래하는 보조 헤지 통로</text>
</svg>
