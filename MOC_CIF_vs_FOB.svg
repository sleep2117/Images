<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="800" height="350">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700&amp;display=swap');
            text { font-family: 'Nanum Gothic', sans-serif; text-anchor: middle; }
            .title { font-size: 20px; font-weight: bold; fill: #000000; text-anchor: start; }
            .panel-title { font-size: 18px; font-weight: bold; fill: #FFFFFF; }
            .label-bold { font-size: 14px; font-weight: bold; fill: #000000; }
            .label-desc { font-size: 12px; fill: #727171; }
            .bracket-text { font-size: 14px; font-weight: bold; }
            .ocean { stroke: #2765FF; stroke-width: 2; stroke-dasharray: 4,4; }
            .source { font-size: 12px; fill: #727171; text-anchor: end; }
            .shadow { filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.1)); }
        </style>
        
        <g id="ship">
            <path d="M -15 -5 L 15 -5 L 20 10 L -20 10 Z" fill="#727171" />
            <rect x="-5" y="-12" width="10" height="7" fill="#EFEFEF" />
            <rect x="-2" y="-15" width="4" height="3" fill="#BC9D7E" />
        </g>
        
        <g id="factory">
            <rect x="-15" y="-10" width="30" height="20" fill="#BC9D7E" />
            <rect x="-10" y="-20" width="5" height="10" fill="#A88B6F" />
            <rect x="5" y="-25" width="5" height="15" fill="#A88B6F" />
        </g>
    </defs>
    
    <rect width="100%" height="100%" fill="#FFFFFF" />
    <text x="40" y="40" class="title">CIF vs FOB 인도 조건: 운임 정규화의 핵심 이유</text>

    <!-- LEFT PANEL: FOB (Deep Red) -->
    <rect x="40" y="70" width="340" height="200" rx="8" fill="#FAFAFA" stroke="#F21B2D" stroke-width="2" class="shadow" />
    <path d="M 40 78 Q 40 70 48 70 L 372 70 Q 380 70 380 78 L 380 110 L 40 110 Z" fill="#F21B2D" />
    <text x="210" y="96" class="panel-title">FOB (Free On Board)</text>
    
    <text x="210" y="130" class="label-bold" fill="#F21B2D">기존 북해 바스켓 호가 기준</text>
    
    <line x1="80" y1="180" x2="340" y2="180" class="ocean" />
    
    <use href="#factory" x="90" y="170" />
    <text x="90" y="200" class="label-bold">선적항 (Seller)</text>
    
    <use href="#ship" x="210" y="170" />
    <text x="210" y="160" class="label-desc">운송</text>
    
    <use href="#factory" x="330" y="170" />
    <text x="330" y="200" class="label-bold">도착항 (Buyer)</text>

    <!-- Brackets for FOB -->
    <!-- Seller responsibility: to the ship -->
    <path d="M 80 215 L 80 220 L 205 220 L 205 215" fill="none" stroke="#F21B2D" stroke-width="2" />
    <text x="142" y="235" class="bracket-text" fill="#F21B2D" font-size="12px">셀러 책임 (선적항까지만)</text>
    
    <!-- Buyer responsibility: fright + insurance -->
    <path d="M 215 215 L 215 220 L 340 220 L 340 215" fill="none" stroke="#011E51" stroke-width="2" />
    <text x="277" y="235" class="bracket-text" fill="#011E51" font-size="12px">바이어 부담 (운임·보험)</text>

    <!-- RIGHT PANEL: CIF (Deep Blue) -->
    <rect x="420" y="70" width="340" height="200" rx="8" fill="#FAFAFA" stroke="#011E51" stroke-width="2" class="shadow" />
    <path d="M 420 78 Q 420 70 428 70 L 752 70 Q 760 70 760 78 L 760 110 L 420 110 Z" fill="#011E51" />
    <text x="590" y="96" class="panel-title">CIF (Cost, Insurance &amp; Freight)</text>
    
    <text x="590" y="130" class="label-bold" fill="#011E51">WTI Midland 편입 후 공정 평가 기준점</text>
    
    <line x1="460" y1="180" x2="720" y2="180" class="ocean" />
    
    <use href="#factory" x="470" y="170" />
    <text x="470" y="200" class="label-bold">선적항 (Seller)</text>
    
    <use href="#ship" x="590" y="170" />
    <text x="590" y="160" class="label-desc">도착항까지 책임</text>
    
    <use href="#factory" x="710" y="170" />
    <text x="710" y="200" class="label-bold">도착항 (Buyer)</text>
    
    <!-- Brackets for CIF -->
    <path d="M 460 215 L 460 220 L 720 220 L 720 215" fill="none" stroke="#011E51" stroke-width="2" />
    <text x="590" y="235" class="bracket-text" fill="#011E51" font-size="13px">셀러 책임 (도착항까지 운임·보험 모두 포함)</text>

    <!-- Conclusion caption box -->
    <rect x="40" y="285" width="720" height="40" rx="8" fill="#F2E9DA" />
    <text x="400" y="310" font-size="14px" font-weight="bold" fill="#000000">대서양을 건너오는 WTI Midland를 기존 북해산(FOB)과 동일 선상에서 평가하려면, 운임을 얹어 도착(CIF) 기준으로 정규화해야 함</text>
    
    <!-- Source -->
    <text x="760" y="340" class="source">자료: 코리아PDS</text>
</svg>
