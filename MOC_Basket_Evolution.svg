<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700&amp;display=swap');
            text { font-family: 'Nanum Gothic', sans-serif; text-anchor: middle; }
            .title { font-size: 20px; font-weight: bold; fill: #000000; text-anchor: start; }
            .subtitle { font-size: 16px; font-weight: bold; fill: #000000; text-anchor: start; }
            .label-title { font-size: 14px; font-weight: bold; fill: #FFFFFF; }
            .label-bold { font-size: 14px; font-weight: bold; fill: #000000; }
            .label { font-size: 13px; fill: #000000; }
            .label-small { font-size: 12px; fill: #727171; }
            .white-bold { font-size: 13px; font-weight: bold; fill: #FFFFFF; }
            .source { font-size: 12px; fill: #727171; text-anchor: end; }
            .shadow { filter: drop-shadow(0px 2px 3px rgba(0,0,0,0.1)); }
        </style>
    </defs>
    
    <rect width="100%" height="100%" fill="#FFFFFF" />
    
    <!-- Title -->
    <text x="40" y="40" class="title">Dated Brent 바스켓 진화 및 정규화(Normalization)</text>
    
    <!-- PART 1: Evolution Timeline -->
    <!-- Timeline Line -->
    <line x1="40" y1="180" x2="760" y2="180" stroke="#727171" stroke-width="2" />
    <polygon points="755,175 765,180 755,185" fill="#727171" />
    
    <!-- Bars (Bottom at 175) -->
    <!-- 1976: Brent -->
    <rect x="70" y="135" width="60" height="40" fill="#BC9D7E" rx="2" />
    <text x="100" y="125" class="label-bold">504k b/d</text>
    <circle cx="100" cy="180" r="5" fill="#BC9D7E" />
    <text x="100" y="205" class="label-bold">1976</text>
    <text x="100" y="225" class="label">Brent 단일</text>
    
    <!-- 2002: Forties, Oseberg -->
    <rect x="220" y="115" width="60" height="60" fill="#F21B2D" rx="2" />
    <text x="250" y="105" class="label-bold">BFO</text>
    <circle cx="250" cy="180" r="5" fill="#F21B2D" />
    <text x="250" y="205" class="label-bold">2002</text>
    <text x="250" y="225" class="label">Forties, Oseberg</text>
    
    <!-- 2007: Ekofisk -->
    <rect x="370" y="95" width="60" height="80" fill="#011E51" rx="2" />
    <text x="400" y="85" class="label-bold">BFOE</text>
    <circle cx="400" cy="180" r="5" fill="#011E51" />
    <text x="400" y="205" class="label-bold">2007</text>
    <text x="400" y="225" class="label">Ekofisk 편입</text>
    
    <!-- 2018: Troll -->
    <rect x="520" y="75" width="60" height="100" fill="#2765FF" rx="2" />
    <text x="550" y="65" class="label-bold">1.2M b/d</text>
    <circle cx="550" cy="180" r="5" fill="#2765FF" />
    <text x="550" y="205" class="label-bold">2018</text>
    <text x="550" y="225" class="label">Troll 편입</text>
    
    <!-- 2022: WTI Midland -->
    <rect x="670" y="55" width="60" height="120" fill="#727171" rx="2" />
    <text x="700" y="45" class="label-bold">1.3M+ b/d</text>
    <circle cx="700" cy="180" r="5" fill="#727171" />
    <text x="700" y="205" class="label-bold">2022</text>
    <text x="700" y="225" class="label" font-weight="bold" fill="#F21B2D">WTI Midland</text>

    <!-- Divider Line -->
    <line x1="40" y1="260" x2="760" y2="260" stroke="#EFEFEF" stroke-width="2" stroke-dasharray="5,5" />
    
    <!-- PART 2: Normalization -->
    <text x="40" y="295" class="subtitle">품질 및 운송 정규화(Normalization) 장치</text>
    
    <!-- Connector Lines -->
    <line x1="120" y1="355" x2="120" y2="385" stroke="#727171" stroke-width="1.5" stroke-dasharray="3,3" />
    <line x1="230" y1="355" x2="230" y2="415" stroke="#727171" stroke-width="1.5" stroke-dasharray="3,3" />
    <line x1="340" y1="355" x2="340" y2="385" stroke="#727171" stroke-width="1.5" stroke-dasharray="3,3" />
    <line x1="450" y1="355" x2="450" y2="385" stroke="#727171" stroke-width="1.5" stroke-dasharray="3,3" />
    <line x1="560" y1="355" x2="560" y2="385" stroke="#727171" stroke-width="1.5" stroke-dasharray="3,3" />
    <line x1="680" y1="355" x2="680" y2="415" stroke="#727171" stroke-width="1.5" stroke-dasharray="3,3" />

    <!-- Rectangles for Grades -->
    <rect x="75" y="320" width="90" height="35" rx="4" fill="#FFFFFF" stroke="#BC9D7E" stroke-width="1.5" class="shadow" />
    <text x="120" y="343" class="label-bold">Brent</text>
    
    <rect x="185" y="320" width="90" height="35" rx="4" fill="#FFFFFF" stroke="#BC9D7E" stroke-width="1.5" class="shadow" />
    <text x="230" y="343" class="label-bold">Forties</text>
    
    <rect x="295" y="320" width="90" height="35" rx="4" fill="#FFFFFF" stroke="#011E51" stroke-width="1.5" class="shadow" />
    <text x="340" y="343" class="label-bold">Oseberg</text>
    
    <rect x="405" y="320" width="90" height="35" rx="4" fill="#FFFFFF" stroke="#011E51" stroke-width="1.5" class="shadow" />
    <text x="450" y="343" class="label-bold">Ekofisk</text>
    
    <rect x="515" y="320" width="90" height="35" rx="4" fill="#FFFFFF" stroke="#011E51" stroke-width="1.5" class="shadow" />
    <text x="560" y="343" class="label-bold">Troll</text>
    
    <rect x="625" y="320" width="110" height="35" rx="4" fill="#F2E9DA" stroke="#F21B2D" stroke-width="2" class="shadow" />
    <text x="680" y="343" class="label-bold" fill="#F21B2D">WTI Midland</text>

    <!-- Base / Quality / Sulfur / Freight Blocks -->
    
    <rect x="75" y="385" width="90" height="30" rx="4" fill="#EFEFEF" />
    <text x="120" y="405" class="label-small">기준(Base)</text>

    <rect x="295" y="385" width="310" height="30" rx="4" fill="#011E51" class="shadow" />
    <text x="450" y="405" class="white-bold">품질 프리미엄 (Quality Premium)</text>

    <rect x="180" y="415" width="100" height="40" rx="4" fill="#F21B2D" class="shadow" />
    <text x="230" y="433" class="white-bold">Sulfur</text>
    <text x="230" y="448" class="white-bold">De-escalator</text>

    <rect x="615" y="415" width="130" height="40" rx="4" fill="#2765FF" class="shadow" />
    <text x="680" y="433" class="white-bold">Freight</text>
    <text x="680" y="448" class="white-bold">Adjustment</text>

    <!-- Source -->
    <text x="750" y="480" class="source">자료: 코리아PDS</text>
</svg>
