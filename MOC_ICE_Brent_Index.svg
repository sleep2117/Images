<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 460" width="1000" height="460">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700&amp;display=swap');
            text { font-family: 'Nanum Gothic', sans-serif; text-anchor: middle; }
            .title { font-size: 20px; font-weight: bold; fill: #000000; text-anchor: start; }
            .section-title { font-size: 15px; font-weight: bold; fill: #727171; }
            .time-box { fill: #FFFFFF; stroke: #BC9D7E; stroke-width: 2px; }
            .time-text { font-size: 14px; font-weight: bold; fill: #BC9D7E; }
            .input-box { fill: #F2E9DA; }
            .input-text { font-size: 13px; font-weight: bold; fill: #011E51; }
            .center-box { fill: #011E51; }
            .center-text { font-size: 18px; font-weight: bold; fill: #FFFFFF; }
            .center-sub { font-size: 12px; fill: #EFEFEF; }
            .highlight-box { fill: #F21B2D; }
            .highlight-text { font-size: 13px; font-weight: bold; fill: #FFFFFF; }
            .source { font-size: 12px; fill: #727171; text-anchor: end; }
            .shadow { filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.1)); }
        </style>
        
        <marker id="arrowRight" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
          <path d="M0,0 L0,6 L9,3 z" fill="#BC9D7E" />
        </marker>
    </defs>
    
    <rect width="100%" height="100%" fill="#FFFFFF" />
    
    <text x="40" y="40" class="title">ICE Brent Index 산출 구조</text>
    
    <!-- Left Section: Times -->
    <text x="130" y="90" class="section-title">ICIS 관찰 윈도우 (5회)</text>
    
    <!-- Time Nodes: center X=130 -->
    <rect x="90" y="115" width="80" height="30" rx="15" class="time-box shadow" />
    <text x="130" y="135" class="time-text">10:00</text>
    
    <rect x="90" y="155" width="80" height="30" rx="15" class="time-box shadow" />
    <text x="130" y="175" class="time-text">12:00</text>
    
    <rect x="90" y="195" width="80" height="30" rx="15" class="time-box shadow" />
    <text x="130" y="215" class="time-text">14:00</text>
    
    <rect x="90" y="235" width="80" height="30" rx="15" class="time-box shadow" />
    <text x="130" y="255" class="time-text">16:00</text>
    
    <rect x="90" y="275" width="80" height="30" rx="15" class="time-box shadow" />
    <text x="130" y="295" class="time-text">19:00</text>
    
    <!-- Connector from Left to Center -->
    <path d="M 170 130 C 250 130, 250 210, 310 210" fill="none" stroke="#BC9D7E" stroke-width="2" />
    <path d="M 170 170 C 230 170, 240 210, 310 210" fill="none" stroke="#BC9D7E" stroke-width="2" />
    <path d="M 170 210 L 310 210" fill="none" stroke="#BC9D7E" stroke-width="2" />
    <path d="M 170 250 C 230 250, 240 210, 310 210" fill="none" stroke="#BC9D7E" stroke-width="2" />
    <path d="M 170 290 C 250 290, 250 210, 310 210" fill="none" stroke="#BC9D7E" stroke-width="2" />
    
    <line x1="310" y1="210" x2="350" y2="210" stroke="#BC9D7E" stroke-width="3" marker-end="url(#arrowRight)" />
    
    <!-- Right Section: Inputs -->
    <text x="760" y="90" class="section-title">실물/파생 핵심 입력 요소</text>
    
    <!-- Input 1 -->
    <rect x="620" y="110" width="280" height="36" rx="4" class="input-box shadow" />
    <rect x="620" y="110" width="6" height="36" fill="#011E51" />
    <text x="760" y="133" class="input-text">M1 BFOETM 실물 거래</text>
    
    <!-- Input 2 -->
    <rect x="620" y="160" width="280" height="36" rx="4" class="input-box shadow" />
    <rect x="620" y="160" width="6" height="36" fill="#011E51" />
    <text x="760" y="183" class="input-text">Cash Spread (M1-M2)</text>
    
    <!-- Input 3 -->
    <rect x="620" y="210" width="280" height="36" rx="4" class="input-box shadow" />
    <rect x="620" y="210" width="6" height="36" fill="#011E51" />
    <text x="760" y="233" class="input-text">M2 EFP</text>
    
    <!-- Input 4 -->
    <rect x="620" y="260" width="280" height="36" rx="4" class="input-box shadow" />
    <rect x="620" y="260" width="6" height="36" fill="#011E51" />
    <text x="760" y="283" class="input-text">M2 Futures Minute Marker</text>
    
    <!-- Connector from Right to Center -->
    <path d="M 620 128 C 580 128, 560 210, 520 210" fill="none" stroke="#011E51" stroke-width="2" />
    <path d="M 620 178 C 580 178, 560 210, 520 210" fill="none" stroke="#011E51" stroke-width="2" />
    <path d="M 620 228 C 580 228, 560 210, 520 210" fill="none" stroke="#011E51" stroke-width="2" />
    <path d="M 620 278 C 580 278, 560 210, 520 210" fill="none" stroke="#011E51" stroke-width="2" />
    
    <line x1="520" y1="210" x2="510" y2="210" stroke="#011E51" stroke-width="3" />
    <polygon points="520,210 530,205 530,215" fill="#011E51" />

    <!-- Center Box -->
    <rect x="360" y="160" width="160" height="90" rx="6" class="center-box shadow" />
    <text x="440" y="195" class="center-text">ICE Brent Index</text>
    <text x="440" y="215" class="center-sub">파생상품 만기(Expiry)</text>
    <text x="440" y="235" class="center-sub">현금결제 기준값</text>

    <!-- Highlight Box -->
    <rect x="240" y="300" width="400" height="36" rx="18" class="highlight-box shadow" />
    <text x="440" y="323" class="highlight-text">★ Dated Brent와는 완벽히 분리된 별도 Layer</text>
    
    <!-- Connection from Center box to Highlight box -->
    <line x1="440" y1="250" x2="440" y2="300" stroke="#F21B2D" stroke-dasharray="4,4" stroke-width="2" />
    
    <!-- Source -->
    <text x="960" y="430" class="source">자료: 코리아PDS</text>
</svg>
