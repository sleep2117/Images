<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700&amp;display=swap');
            text { font-family: 'Nanum Gothic', sans-serif; text-anchor: middle; }
            .title { font-size: 20px; font-weight: bold; fill: #000000; text-anchor: start; }
            .panel-title { font-size: 18px; font-weight: bold; }
            .cal-month { font-size: 14px; font-weight: bold; fill: #FFFFFF; }
            .label-bold { font-size: 15px; font-weight: bold; fill: #000000; }
            .label-desc { font-size: 13px; fill: #727171; }
            .conclusion { font-size: 16px; font-weight: bold; fill: #000000; }
            .source { font-size: 12px; fill: #727171; text-anchor: end; }
            .shadow { filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.1)); }
        </style>
        
        <marker id="arrowRight" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
          <path d="M0,0 L0,6 L9,3 z" fill="#727171" />
        </marker>
    </defs>
    
    <rect width="100%" height="100%" fill="#FFFFFF" />
    
    <!-- Overall Title -->
    <text x="40" y="40" class="title">두바이 MOC vs 북해(North Sea) MOC 시간 구조 대비</text>

    <!-- Left Panel: Dubai (Deep Blue) -->
    <rect x="40" y="70" width="340" height="230" rx="8" fill="#FFFFFF" stroke="#011E51" stroke-width="2" class="shadow" />
    <path d="M 40 78 Q 40 70 48 70 L 372 70 Q 380 70 380 78 L 380 110 L 40 110 Z" fill="#011E51" />
    <text x="210" y="96" class="panel-title" fill="#FFFFFF">Dubai Window</text>
    
    <!-- Dubai Calendars -->
    <!-- March Calendar -->
    <rect x="80" y="140" width="80" height="70" rx="4" fill="#FFFFFF" stroke="#BC9D7E" stroke-width="2" />
    <rect x="80" y="140" width="80" height="22" fill="#BC9D7E" />
    <text x="120" y="156" class="cal-month">March</text>
    <!-- Grid -->
    <rect x="92" y="168" width="12" height="12" fill="#EFEFEF" />
    <rect x="108" y="168" width="12" height="12" fill="#EFEFEF" />
    <rect x="124" y="168" width="12" height="12" fill="#EFEFEF" />
    <rect x="140" y="168" width="12" height="12" fill="#EFEFEF" />
    <rect x="92" y="186" width="12" height="12" fill="#EFEFEF" />
    <rect x="108" y="186" width="12" height="12" fill="#EFEFEF" />
    <rect x="124" y="186" width="12" height="12" fill="#EFEFEF" />
    <rect x="140" y="186" width="12" height="12" fill="#EFEFEF" />
    
    <text x="120" y="235" class="label-bold" fill="#011E51">Trading May barrels</text>
    
    <!-- Arrow -->
    <line x1="175" y1="175" x2="235" y2="175" stroke="#727171" stroke-width="2" marker-end="url(#arrowRight)" />
    
    <!-- April Calendar -->
    <rect x="250" y="140" width="80" height="70" rx="4" fill="#FFFFFF" stroke="#BC9D7E" stroke-width="2" />
    <rect x="250" y="140" width="80" height="22" fill="#BC9D7E" />
    <text x="290" y="156" class="cal-month">April</text>
    <!-- Grid -->
    <rect x="262" y="168" width="12" height="12" fill="#EFEFEF" />
    <rect x="278" y="168" width="12" height="12" fill="#EFEFEF" />
    <rect x="294" y="168" width="12" height="12" fill="#EFEFEF" />
    <rect x="310" y="168" width="12" height="12" fill="#EFEFEF" />
    <rect x="262" y="186" width="12" height="12" fill="#EFEFEF" />
    <rect x="278" y="186" width="12" height="12" fill="#EFEFEF" />
    <rect x="294" y="186" width="12" height="12" fill="#EFEFEF" />
    <rect x="310" y="186" width="12" height="12" fill="#EFEFEF" />

    <text x="290" y="235" class="label-bold" fill="#011E51">Trading June (M+2)</text>
    
    <text x="210" y="265" class="label-bold">월물(Monthly) 구조</text>
    <text x="210" y="285" class="label-desc">M+2 (두 달 앞) 화물을 월(Month) 단위로 거래</text>

    <!-- Right Panel: North Sea (Deep Red) -->
    <rect x="420" y="70" width="340" height="230" rx="8" fill="#FFFFFF" stroke="#F21B2D" stroke-width="2" class="shadow" />
    <path d="M 420 78 Q 420 70 428 70 L 752 70 Q 760 70 760 78 L 760 110 L 420 110 Z" fill="#F21B2D" />
    <text x="590" y="96" class="panel-title" fill="#FFFFFF">North Sea Window</text>

    <!-- North Sea Timeline -->
    <text x="590" y="140" class="label-bold">평가일 (Assessment Date)</text>
    <line x1="450" y1="170" x2="730" y2="170" stroke="#F2E9DA" stroke-width="6" />
    
    <!-- Highlighted section -->
    <line x1="530" y1="170" x2="680" y2="170" stroke="#F21B2D" stroke-width="6" />
    
    <circle cx="480" cy="170" r="6" fill="#727171" />
    <text x="480" y="195" class="label-bold">Today</text>
    
    <circle cx="530" cy="170" r="6" fill="#F21B2D" />
    <text x="530" y="155" class="label-bold" fill="#F21B2D">+10 Days</text>
    
    <circle cx="680" cy="170" r="6" fill="#F21B2D" />
    <text x="680" y="155" class="label-bold" fill="#F21B2D">+30 Days</text>
    
    <rect x="495" y="215" width="190" height="30" rx="4" fill="#F2E9DA" />
    <text x="590" y="235" class="label-bold" fill="#F21B2D">Delivery 10~30 days ahead</text>
    
    <text x="590" y="265" class="label-bold">날짜물(Daily Laycan) 구조</text>
    <text x="590" y="285" class="label-desc">일(日) 단위로 선적 날짜를 특정하여 호가</text>

    <!-- Conclusion Box spanning both -->
    <rect x="40" y="320" width="720" height="40" rx="8" fill="#EFEFEF" />
    <text x="400" y="345" class="conclusion">두바이는 시간 해상도가 거친 대신 참여 폭이 넓고, 북해는 해상도가 촘촘한 대신 참여자가 좁다.</text>
    
    <!-- Source -->
    <text x="760" y="385" class="source">자료: 코리아PDS</text>
</svg>
