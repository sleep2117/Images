<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" width="800" height="320">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700&amp;display=swap');
            text { font-family: 'Nanum Gothic', sans-serif; text-anchor: middle; }
            .title { font-size: 20px; font-weight: bold; fill: #000000; text-anchor: start; }
            .box-title { font-size: 14px; font-weight: bold; fill: #FFFFFF; }
            .box-desc { font-size: 13px; fill: #000000; }
            .timeline-desc { font-size: 12px; fill: #727171; }
            .source { font-size: 12px; fill: #727171; text-anchor: end; }
            .shadow { filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.1)); }
        </style>
    </defs>
    
    <rect width="100%" height="100%" fill="#FFFFFF" />
    
    <!-- Title -->
    <text x="45" y="40" class="title">MOC Window: 경쟁적 호가가 Dated Brent가 되는 과정</text>
    
    <!-- Timeline Base -->
    <line x1="45" y1="230" x2="745" y2="230" stroke="#727171" stroke-width="2" />
    <polygon points="740,225 750,230 740,235" fill="#727171" />

    <!-- Step 1: 16:00 전후 -->
    <!-- Connect Line -->
    <line x1="120" y1="180" x2="120" y2="230" stroke="#BC9D7E" stroke-width="2" />
    <!-- Center Dot -->
    <circle cx="120" cy="230" r="6" fill="#BC9D7E" />
    <!-- Box -->
    <rect x="45" y="80" width="150" height="100" rx="4" fill="#FFFFFF" stroke="#BC9D7E" stroke-width="1.5" class="shadow" />
    <path d="M 45 84 Q 45 80 49 80 L 191 80 Q 195 80 195 84 L 195 110 L 45 110 Z" fill="#BC9D7E" />
    <text x="120" y="100" class="box-title" font-weight="bold">16:00 전후</text>
    <text x="120" y="135" class="box-desc" font-weight="bold">장중 호가</text>
    <text x="120" y="155" class="box-desc" fill="#727171">(일반적인 거래)</text>
    <text x="120" y="255" class="timeline-desc">비정형적 시장</text>

    <!-- Arrow 1 to 2 -->
    <polyline points="205,123 215,130 205,137" stroke="#727171" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Step 2: 16:30 종가 시점 -->
    <line x1="300" y1="180" x2="300" y2="230" stroke="#F21B2D" stroke-width="2" />
    <circle cx="300" cy="230" r="6" fill="#F21B2D" />
    <rect x="225" y="80" width="150" height="100" rx="4" fill="#FFFFFF" stroke="#F21B2D" stroke-width="1.5" class="shadow" />
    <path d="M 225 84 Q 225 80 229 80 L 371 80 Q 375 80 375 84 L 375 110 L 225 110 Z" fill="#F21B2D" />
    <text x="300" y="100" class="box-title" font-weight="bold">16:30 MOC Window</text>
    <text x="300" y="130" class="box-desc" font-weight="bold">열린 firm bid/offer</text>
    <text x="300" y="150" class="box-desc">경쟁적 호가 집중</text>
    <text x="300" y="168" class="box-desc" font-size="11px" fill="#727171">(종가 시점)</text>
    <text x="300" y="255" class="timeline-desc" font-weight="bold" fill="#F21B2D">투명하고 공개된 호가</text>

    <!-- Arrow 2 to 3 -->
    <polyline points="385,123 395,130 385,137" stroke="#727171" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Step 3: 정규화 -->
    <line x1="480" y1="180" x2="480" y2="230" stroke="#011E51" stroke-width="2" />
    <circle cx="480" cy="230" r="6" fill="#011E51" />
    <rect x="405" y="80" width="150" height="100" rx="4" fill="#FFFFFF" stroke="#011E51" stroke-width="1.5" class="shadow" />
    <path d="M 405 84 Q 405 80 409 80 L 551 80 Q 555 80 555 84 L 555 110 L 405 110 Z" fill="#011E51" />
    <text x="480" y="100" class="box-title" font-weight="bold">종가 이후</text>
    <text x="480" y="135" class="box-desc" font-weight="bold">Platts 정규화</text>
    <text x="480" y="155" class="box-desc">(Normalization)</text>
    <text x="480" y="255" class="timeline-desc">품질 및 선적 조건 표준화</text>

    <!-- Arrow 3 to 4 -->
    <polyline points="565,123 575,130 565,137" stroke="#727171" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Step 4: 확정 -->
    <line x1="660" y1="180" x2="660" y2="230" stroke="#2765FF" stroke-width="2" />
    <circle cx="660" cy="230" r="6" fill="#2765FF" />
    <rect x="585" y="80" width="150" height="100" rx="4" fill="#FFFFFF" stroke="#2765FF" stroke-width="1.5" class="shadow" />
    <path d="M 585 84 Q 585 80 589 80 L 731 80 Q 735 80 735 84 L 735 110 L 585 110 Z" fill="#2765FF" />
    <text x="660" y="100" class="box-title" font-weight="bold">최종 확정</text>
    <text x="660" y="135" class="box-desc" font-weight="bold" fill="#2765FF">Dated Brent</text>
    <text x="660" y="155" class="box-desc">그날의 벤치마크 공시</text>
    <text x="660" y="255" class="timeline-desc">원유 시장 기준 가격</text>

    <!-- Source -->
    <text x="745" y="290" class="source">자료: 코리아PDS</text>
</svg>
