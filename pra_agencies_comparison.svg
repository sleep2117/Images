<svg width="910" height="450" xmlns="http://www.w3.org/2000/svg" style="background-color: #FFFFFF;">
  <!-- Title & Caption -->
  <text x="40" y="45" font-family="NanumGothic, sans-serif" font-size="20" fill="#000000" font-weight="bold">원유 실물 시장의 주요 가격평가기관(PRA) 비교</text>
  
  <!-- Column Headers -->
  <text x="160" y="85" font-family="NanumGothic, sans-serif" font-size="15" fill="#727171" text-anchor="end" font-weight="bold">분류 기준</text>
  
  <g font-family="NanumGothic, sans-serif" font-size="22" font-weight="bold" text-anchor="middle">
    <text x="290" y="85" fill="#F21B2D">Platts</text>
    <text x="525" y="85" fill="#011E51">Argus</text>
    <text x="755" y="85" fill="#000000">ICIS</text>
  </g>

  <!-- Table Grid Lines -->
  <!-- Top / Headers border -->
  <line x1="40" y1="100" x2="870" y2="100" stroke="#011E51" stroke-width="2.5" />
  <line x1="40" y1="140" x2="870" y2="140" stroke="#EFEFEF" stroke-width="1.5" />
  <line x1="40" y1="180" x2="870" y2="180" stroke="#EFEFEF" stroke-width="1.5" />
  <line x1="40" y1="220" x2="870" y2="220" stroke="#EFEFEF" stroke-width="1.5" />
  <!-- Method row borders -->
  <line x1="40" y1="280" x2="870" y2="280" stroke="#EFEFEF" stroke-width="1.5" />
  <!-- Benchmarks line -->
  <line x1="40" y1="330" x2="870" y2="330" stroke="#EFEFEF" stroke-width="1.5" />
  <!-- Bottom Border -->
  <line x1="40" y1="400" x2="870" y2="400" stroke="#011E51" stroke-width="2.5" />

  <!-- Vertical Division Borders (dashed) -->
  <line x1="175" y1="100" x2="175" y2="400" stroke="#EFEFEF" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="410" y1="100" x2="410" y2="400" stroke="#EFEFEF" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="640" y1="100" x2="640" y2="400" stroke="#EFEFEF" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- Column 1 (Row Headers) -->
  <g font-family="NanumGothic, sans-serif" font-size="14" fill="#727171" text-anchor="end" font-weight="bold">
    <text x="160" y="125">설립 연도</text>
    <text x="160" y="165">현재 모회사</text>
    <text x="160" y="205">본사 위치</text>
    <text x="160" y="255">핵심 방법론</text>
    <text x="160" y="310">대표 벤치마크</text>
    <text x="160" y="360">원유 시장에서의</text>
    <text x="160" y="380">독자적 역할</text>
  </g>

  <!-- Column 2 (Platts) -->
  <g font-family="NanumGothic, sans-serif" font-size="14" fill="#000000" text-anchor="middle">
    <text x="290" y="125">1909년 (미국 석유 전문지 출발)</text>
    <text x="290" y="165">S&amp;P Global</text>
    <text x="290" y="205">영국 런던 (Canary Wharf)</text>
    <text x="290" y="310">Dated Brent, Dubai/Oman</text>
    <text x="290" y="360">특정 시점(Window)을 기준으로 한</text>
    <text x="290" y="380" font-weight="bold" fill="#F21B2D">글로벌 표준 현물가격 평가 공지</text>
  </g>

  <!-- Column 3 (Argus) -->
  <g font-family="NanumGothic, sans-serif" font-size="14" fill="#000000" text-anchor="middle">
    <text x="525" y="125">1970년 (런던 주간뉴스레터 출발)</text>
    <text x="525" y="165">General Atlantic (비상장 유지)</text>
    <text x="525" y="205">영국 런던 도심</text>
    <text x="525" y="310">ASCI, Argus WTI Houston, ESPO</text>
    <text x="525" y="360">투명한 다수 거래량을 가중 합산해</text>
    <text x="525" y="380" font-weight="bold" fill="#011E51">실물 시장을 반영하는 현물 대안지표</text>
  </g>

  <!-- Column 4 (ICIS) -->
  <g font-family="NanumGothic, sans-serif" font-size="14" fill="#000000" text-anchor="middle">
    <text x="755" y="125">1980년대 (ICIS-LOR 형성)</text>
    <text x="755" y="165">RELX plc</text>
    <text x="755" y="205">영국 런던</text>
    <text x="755" y="310" fill="#727171">(전용 지수보다 데이터 집계 역할 주력)</text>
    <text x="755" y="360">거대 ICE Brent 현물 지수 정산용</text>
    <text x="755" y="380" font-weight="bold" fill="#000000">필수 현물 원시 데이터 납품 파이프라인</text>
  </g>

  <!-- Highlights for Methodology (Row 4) -->
  <g transform="translate(0, 226)">
    <!-- Platts -->
    <rect x="183" y="0" width="214" height="48" rx="6" fill="#F21B2D"/>
    <text x="290" y="20" font-family="NanumGothic, sans-serif" font-size="15" fill="#FFFFFF" text-anchor="middle" font-weight="bold">MOC (Market on Close)</text>
    <text x="290" y="38" font-family="NanumGothic, sans-serif" font-size="12" fill="#FFFFFF" text-anchor="middle" opacity="0.9">정해진 마감 시간 창구(Window) 체결 평가</text>

    <!-- Argus -->
    <rect x="418" y="0" width="214" height="48" rx="6" fill="#011E51"/>
    <text x="525" y="20" font-family="NanumGothic, sans-serif" font-size="15" fill="#FFFFFF" text-anchor="middle" font-weight="bold">거래량 가중 평가 (VWA)</text>
    <text x="525" y="38" font-family="NanumGothic, sans-serif" font-size="12" fill="#FFFFFF" text-anchor="middle" opacity="0.9">하루 전체 실물 거래량 기준 가중치 합산</text>

    <!-- ICIS -->
    <rect x="648" y="0" width="214" height="48" rx="6" fill="#F2E9DA" stroke="#BC9D7E" stroke-width="1.5"/>
    <text x="755" y="20" font-family="NanumGothic, sans-serif" font-size="15" fill="#000000" text-anchor="middle" font-weight="bold">ICE Brent Index 공식 입력</text>
    <text x="755" y="38" font-family="NanumGothic, sans-serif" font-size="11" fill="#727171" text-anchor="middle">5개 시점(10:30~19:30) 누적 공식 샘플링 제공</text>
  </g>

  <!-- Footer -->
  <text x="870" y="430" font-family="NanumGothic, sans-serif" font-size="12" fill="#727171" text-anchor="end">자료: 코리아PDS 자체 재구성</text>

</svg>
