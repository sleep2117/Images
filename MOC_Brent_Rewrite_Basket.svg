<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 520" width="1100" height="520">
  <defs>
    <style>
      text { font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; }
      .title { font-size: 26px; font-weight: 700; fill: #111827; }
      .subtitle { font-size: 15px; fill: #4B5563; }
      .label { font-size: 15px; font-weight: 700; fill: #111827; }
      .small { font-size: 13px; fill: #4B5563; }
      .white { fill: #FFFFFF; }
      .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 2; }
      .north { fill: #0F3A5F; }
      .midland { fill: #B45309; }
      .accent { fill: #F21B2D; }
    </style>
    <marker id="arrow-red" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,8 L11,4 z" fill="#F21B2D"/>
    </marker>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,8 L11,4 z" fill="#0F3A5F"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#F8FAFC"/>
  <text x="50" y="50" class="title">Dated Brent는 여섯 등급 바스켓에서 나옵니다</text>
  <text x="50" y="78" class="subtitle">한 유전 가격이 아니라, 조건을 맞춘 여러 실물 화물 중 가장 경쟁적인 가격을 매일 고르는 구조입니다.</text>

  <rect x="50" y="115" width="635" height="260" rx="14" class="card"/>
  <text x="82" y="152" class="label">북해 등급</text>
  <text x="82" y="178" class="small">기존 Brent 바스켓의 중심</text>

  <g>
    <rect x="82" y="210" width="105" height="64" rx="10" class="north"/>
    <text x="134" y="248" text-anchor="middle" class="label white">Brent</text>
    <rect x="202" y="210" width="105" height="64" rx="10" class="north"/>
    <text x="254" y="248" text-anchor="middle" class="label white">Forties</text>
    <rect x="322" y="210" width="105" height="64" rx="10" class="north"/>
    <text x="374" y="248" text-anchor="middle" class="label white">Oseberg</text>
    <rect x="442" y="210" width="105" height="64" rx="10" class="north"/>
    <text x="494" y="248" text-anchor="middle" class="label white">Ekofisk</text>
    <rect x="562" y="210" width="88" height="64" rx="10" class="north"/>
    <text x="606" y="248" text-anchor="middle" class="label white">Troll</text>
  </g>

  <rect x="50" y="400" width="635" height="72" rx="14" fill="#FFF7ED" stroke="#FDBA74" stroke-width="2"/>
  <text x="82" y="432" class="label">WTI Midland</text>
  <text x="82" y="458" class="small">미국산 원유지만 운임, 품질, 결제 조건을 보정해 북해 기준선 위에서 비교합니다.</text>

  <line x1="700" y1="250" x2="785" y2="250" stroke="#F21B2D" stroke-width="4" marker-end="url(#arrow-red)"/>
  <line x1="700" y1="435" x2="785" y2="320" stroke="#B45309" stroke-width="3" marker-end="url(#arrow-red)"/>

  <rect x="810" y="160" width="240" height="115" rx="14" fill="#FFFFFF" stroke="#F21B2D" stroke-width="3"/>
  <text x="930" y="198" text-anchor="middle" class="label">조건 보정</text>
  <text x="930" y="226" text-anchor="middle" class="small">품질, 운임, 결제 시점</text>
  <text x="930" y="252" text-anchor="middle" class="small">서로 비교 가능한 가격으로 환산</text>

  <line x1="930" y1="282" x2="930" y2="335" stroke="#0F3A5F" stroke-width="4" marker-end="url(#arrow-blue)"/>

  <rect x="790" y="355" width="280" height="95" rx="16" fill="#F21B2D"/>
  <text x="930" y="392" text-anchor="middle" class="label white">그날 가장 경쟁적인 화물</text>
  <text x="930" y="422" text-anchor="middle" class="small white">Dated Brent 기준가격 형성</text>
</svg>
