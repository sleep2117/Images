<svg width="920" height="460" xmlns="http://www.w3.org/2000/svg" style="background-color: #FFFFFF;">
  <!-- Title & Caption -->
  <text x="40" y="40" font-family="NanumGothic, sans-serif" font-size="20" fill="#000000" font-weight="bold">원유 가격 결정 체계의 6대 전환 타임라인</text>
  <text x="40" y="60" font-family="NanumGothic, sans-serif" font-size="13" fill="#727171">가격을 선언하는 주체에서, PRA/거래소가 평가하고 규제 당국이 감독하는 벤치마크 체계로의 진화 모식도</text>

  <!-- Top Phase Headers -->
  <g font-family="NanumGothic, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">
    <rect x="145" y="75" width="110" height="22" rx="11" fill="#BC9D7E" fill-opacity="0.2"/>
    <text x="200" y="90" fill="#BC9D7E">① 메이저 카르텔</text>

    <text x="265" y="90" fill="#727171">→</text>

    <rect x="275" y="75" width="140" height="22" rx="11" fill="#F21B2D" fill-opacity="0.2"/>
    <text x="345" y="90" fill="#F21B2D">② OPEC 산유국 주도</text>

    <text x="425" y="90" fill="#727171">→</text>

    <rect x="435" y="75" width="130" height="22" rx="11" fill="#011E51" fill-opacity="0.2"/>
    <text x="500" y="90" fill="#011E51">③ PRA 실물 평가</text>

    <text x="575" y="90" fill="#727171">→</text>

    <rect x="585" y="75" width="130" height="22" rx="11" fill="#2765FF" fill-opacity="0.2"/>
    <text x="650" y="90" fill="#2765FF">④ 거래소·현물 혼합</text>

    <text x="725" y="90" fill="#727171">→</text>

    <rect x="735" y="75" width="155" height="22" rx="11" fill="#727171" fill-opacity="0.2"/>
    <text x="812" y="90" fill="#727171">⑤ 하이브리드 공공재화</text>
  </g>

  <!-- Background Zones -->
  <rect x="140" y="100" width="760" height="80" fill="#BC9D7E" opacity="0.1"/>
  <rect x="140" y="180" width="760" height="80" fill="#F21B2D" opacity="0.08"/>
  <rect x="140" y="260" width="760" height="80" fill="#011E51" opacity="0.08"/>
  <rect x="140" y="340" width="760" height="80" fill="#727171" opacity="0.1"/>

  <!-- Left Y Axis Semantic Labels -->
  <text x="130" y="80" font-family="NanumGothic, sans-serif" font-size="12" fill="#727171" text-anchor="end" font-weight="bold">가격 주도권</text>
  <line x1="135" y1="90" x2="135" y2="420" stroke="#727171" stroke-width="2"/>
  <line x1="130" y1="140" x2="140" y2="140" stroke="#BC9D7E" stroke-width="2"/>
  <line x1="130" y1="220" x2="140" y2="220" stroke="#F21B2D" stroke-width="2"/>
  <line x1="130" y1="300" x2="140" y2="300" stroke="#011E51" stroke-width="2"/>
  <line x1="130" y1="380" x2="140" y2="380" stroke="#727171" stroke-width="2"/>
  
  <text x="125" y="145" font-family="NanumGothic, sans-serif" font-size="13" fill="#BC9D7E" text-anchor="end" font-weight="bold">메이저 카르텔 선언</text>
  <text x="125" y="225" font-family="NanumGothic, sans-serif" font-size="13" fill="#F21B2D" text-anchor="end" font-weight="bold">OPEC 산유국 결정</text>
  <text x="125" y="305" font-family="NanumGothic, sans-serif" font-size="13" fill="#011E51" text-anchor="end" font-weight="bold">시장 현물 및 거래소</text>
  <text x="125" y="385" font-family="NanumGothic, sans-serif" font-size="13" fill="#727171" text-anchor="end" font-weight="bold">규제 당국 공공 감독</text>

  <!-- Vertical Milestone Lines -->
  <line x1="160" y1="100" x2="160" y2="420" stroke="#BC9D7E" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="300" y1="100" x2="300" y2="420" stroke="#F21B2D" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="440" y1="100" x2="440" y2="420" stroke="#F21B2D" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="580" y1="100" x2="580" y2="420" stroke="#011E51" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="720" y1="100" x2="720" y2="420" stroke="#2765FF" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="860" y1="100" x2="860" y2="420" stroke="#727171" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- Main Timeline Path -->
  <path d="M 160 140 C 230 140, 230 220, 300 220 L 440 220 C 510 220, 510 300, 580 300 L 720 300 C 790 300, 790 380, 860 380" fill="none" stroke="#727171" stroke-width="3" />

  <!-- Node Circles (Overlays path) -->
  <circle cx="160" cy="140" r="7" fill="#BC9D7E" stroke="#FFFFFF" stroke-width="2"/>
  <circle cx="300" cy="220" r="7" fill="#F21B2D" stroke="#FFFFFF" stroke-width="2"/>
  <circle cx="440" cy="220" r="7" fill="#F21B2D" stroke="#FFFFFF" stroke-width="2"/>
  <circle cx="580" cy="300" r="7" fill="#011E51" stroke="#FFFFFF" stroke-width="2"/>
  <circle cx="720" cy="300" r="7" fill="#2765FF" stroke="#FFFFFF" stroke-width="2"/>
  <circle cx="860" cy="380" r="7" fill="#727171" stroke="#FFFFFF" stroke-width="2"/>

  <!-- Text Annotations -->
  <text x="160" y="120" font-family="NanumGothic, sans-serif" font-size="13" fill="#BC9D7E" font-weight="bold" text-anchor="middle">1928 Achnacarry</text>
  <text x="160" y="135" font-family="NanumGothic, sans-serif" font-size="12" fill="#000000" text-anchor="middle">세금용 공시가격 체제</text>

  <text x="300" y="195" font-family="NanumGothic, sans-serif" font-size="13" fill="#F21B2D" font-weight="bold" text-anchor="middle">1971 Tehran·Tripoli</text>
  <text x="300" y="210" font-family="NanumGothic, sans-serif" font-size="12" fill="#000000" text-anchor="middle">산유국 가격 결정권 확보</text>

  <text x="440" y="245" font-family="NanumGothic, sans-serif" font-size="13" fill="#F21B2D" font-weight="bold" text-anchor="middle">1973.10.16 특단 인상</text>
  <text x="440" y="260" font-family="NanumGothic, sans-serif" font-size="12" fill="#000000" text-anchor="middle">$3.01 → $5.11 (1차 쇼크)</text>

  <text x="580" y="325" font-family="NanumGothic, sans-serif" font-size="13" fill="#011E51" font-weight="bold" text-anchor="middle">1986 Netback 붕괴</text>
  <text x="580" y="340" font-family="NanumGothic, sans-serif" font-size="12" fill="#000000" text-anchor="middle">관리가격 폭락 ($28→$11)</text>

  <text x="720" y="265" font-family="NanumGothic, sans-serif" font-size="13" fill="#2765FF" font-weight="bold" text-anchor="middle">1983 / 1988 거래소 상장</text>
  <text x="720" y="280" font-family="NanumGothic, sans-serif" font-size="12" fill="#000000" text-anchor="middle">NYMEX WTI, IPE Brent</text>
  <text x="720" y="295" font-family="NanumGothic, sans-serif" font-size="11" fill="#727171" text-anchor="middle">벤치마크 기반 현선물 융합</text>

  <text x="880" y="345" font-family="NanumGothic, sans-serif" font-size="13" fill="#727171" font-weight="bold" text-anchor="end">2011 Cannes / 2012 IOSCO</text>
  <text x="880" y="360" font-family="NanumGothic, sans-serif" font-size="12" fill="#000000" text-anchor="end">벤치마크 공정성 규제 확립</text>

  <!-- Footer -->
  <text x="900" y="445" font-family="NanumGothic, sans-serif" font-size="12" fill="#727171" text-anchor="end">자료: 코리아PDS 자체 재구성</text>
</svg>
