<svg width="950" height="500" xmlns="http://www.w3.org/2000/svg" style="background-color: #FFFFFF;">
  <!-- Arrows Definitions -->
  <defs>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#011E51"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#F21B2D"/>
    </marker>
  </defs>

  <!-- Title & Caption -->
  <text x="40" y="40" font-family="NanumGothic, sans-serif" font-size="20" fill="#000000" font-weight="bold">원유 가격 결정 체계 종합 진화 맵 (1920s ~ Present)</text>
  <text x="40" y="60" font-family="NanumGothic, sans-serif" font-size="13" fill="#727171">카르텔과 일방적 국가통제 시대를 거쳐, PRA와 거래소가 시장의 호가를 투명하게 산출하고 공정성 감시를 받는 3대 벤치마크 체제로 완성되기까지</text>

  <!-- Column Titles -->
  <text x="150" y="100" font-family="NanumGothic, sans-serif" font-size="16" fill="#727171" font-weight="bold" text-anchor="middle">1. 막이 내린 권력형 시대</text>
  <text x="455" y="100" font-family="NanumGothic, sans-serif" font-size="16" fill="#011E51" font-weight="bold" text-anchor="middle">2. 신규 제도의 안착 확립</text>
  <text x="785" y="100" font-family="NanumGothic, sans-serif" font-size="16" fill="#F21B2D" font-weight="bold" text-anchor="middle">3. 글로벌 3대 벤치마크</text>

  <!-- Enclosures for Col 2 & Col 3 -->
  <rect x="325" y="125" width="260" height="320" rx="8" fill="#F4F6FC" stroke="#DCE1F2" stroke-width="1.5"/>
  <rect x="650" y="125" width="270" height="320" rx="8" fill="#FFF5F5" stroke="#FAD9D9" stroke-width="1.5"/>

  <!-- ~~~~~~~~~~~ CONNECTING ARROW TREES ~~~~~~~~~~~ -->
  <!-- Left to Center Connecting Tree -->
  <line x1="260" y1="140" x2="292" y2="140" stroke="#011E51" stroke-width="1.5"/>
  <line x1="260" y1="230" x2="292" y2="230" stroke="#011E51" stroke-width="1.5"/>
  <line x1="260" y1="320" x2="292" y2="320" stroke="#011E51" stroke-width="1.5"/>
  <line x1="260" y1="410" x2="292" y2="410" stroke="#011E51" stroke-width="1.5"/>
  <line x1="292" y1="140" x2="292" y2="410" stroke="#011E51" stroke-width="1.5"/>
  <line x1="292" y1="275" x2="318" y2="275" stroke="#011E51" stroke-width="3" marker-end="url(#arrowBlue)"/>

  <!-- Center to Right Connecting Tree -->
  <line x1="585" y1="275" x2="617" y2="275" stroke="#F21B2D" stroke-width="3"/>
  <line x1="617" y1="185" x2="617" y2="385" stroke="#F21B2D" stroke-width="1.5"/>
  <line x1="617" y1="185" x2="642" y2="185" stroke="#F21B2D" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <line x1="617" y1="285" x2="642" y2="285" stroke="#F21B2D" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <line x1="617" y1="385" x2="642" y2="385" stroke="#F21B2D" stroke-width="1.5" marker-end="url(#arrowRed)"/>

  <!-- ~~~~~~~~~~~ COLUMN 1: 시대 ~~~~~~~~~~~ -->
  <!-- Box 1: 1928 -->
  <rect x="40" y="105" width="220" height="70" rx="6" fill="#BC9D7E" fill-opacity="0.1" stroke="#BC9D7E" stroke-width="1.5"/>
  <text x="150" y="132" font-family="NanumGothic, sans-serif" font-size="14" fill="#8B6D4E" font-weight="bold" text-anchor="middle">Achnacarry 협정 (1928)</text>
  <text x="150" y="155" font-family="NanumGothic, sans-serif" font-size="12" fill="#000000" text-anchor="middle">메이저 카르텔의 공시가격 선언</text>

  <!-- Box 2: 1971~1973 -->
  <rect x="40" y="195" width="220" height="70" rx="6" fill="#F21B2D" fill-opacity="0.05" stroke="#F21B2D" stroke-width="1.5"/>
  <text x="150" y="222" font-family="NanumGothic, sans-serif" font-size="14" fill="#F21B2D" font-weight="bold" text-anchor="middle">OPEC 자원 주권 (1971~73)</text>
  <text x="150" y="245" font-family="NanumGothic, sans-serif" font-size="12" fill="#000000" text-anchor="middle">산유국의 가격 일방 인상 결정</text>

  <!-- Box 3: 1986 -->
  <rect x="40" y="285" width="220" height="70" rx="6" fill="#727171" fill-opacity="0.05" stroke="#727171" stroke-width="1.5"/>
  <text x="150" y="312" font-family="NanumGothic, sans-serif" font-size="14" fill="#727171" font-weight="bold" text-anchor="middle">Netback 가격 붕괴 (1986)</text>
  <text x="150" y="335" font-family="NanumGothic, sans-serif" font-size="12" fill="#000000" text-anchor="middle">어항 속 관리가격 체제의 전면 종언</text>

  <!-- Box 4: 1987~ -->
  <rect x="40" y="375" width="220" height="70" rx="6" fill="#011E51" fill-opacity="0.05" stroke="#011E51" stroke-width="1.5"/>
  <text x="150" y="402" font-family="NanumGothic, sans-serif" font-size="14" fill="#011E51" font-weight="bold" text-anchor="middle">Market-related Pricing (1987~)</text>
  <text x="150" y="425" font-family="NanumGothic, sans-serif" font-size="12" fill="#000000" text-anchor="middle">실제 거래 시세 변동 추종으로 전환</text>

  <!-- ~~~~~~~~~~~ COLUMN 2: 제도 ~~~~~~~~~~~ -->
  <!-- Box 1: PRA -->
  <rect x="340" y="145" width="230" height="80" rx="6" fill="#FFFFFF" stroke="#011E51" stroke-width="1.5"/>
  <text x="455" y="170" font-family="NanumGothic, sans-serif" font-size="15" fill="#011E51" font-weight="bold" text-anchor="middle">가격평가기관 (PRA) 부상</text>
  <text x="455" y="195" font-family="NanumGothic, sans-serif" font-size="12" fill="#727171" text-anchor="middle">Platts · Argus · ICIS 등</text>
  <text x="455" y="210" font-family="NanumGothic, sans-serif" font-size="12" fill="#727171" text-anchor="middle">신뢰받는 제3자 데이터 중개자 형성</text>

  <!-- Box 2: MOC -->
  <rect x="340" y="245" width="230" height="80" rx="6" fill="#FFFFFF" stroke="#011E51" stroke-width="1.5"/>
  <text x="455" y="270" font-family="NanumGothic, sans-serif" font-size="15" fill="#011E51" font-weight="bold" text-anchor="middle">평가 방법론 설계 및 투명화</text>
  <text x="455" y="295" font-family="NanumGothic, sans-serif" font-size="12" fill="#727171" text-anchor="middle">Platts MOC, Argus 거래량 가중 등</text>
  <text x="455" y="310" font-family="NanumGothic, sans-serif" font-size="12" fill="#727171" text-anchor="middle">파편화된 시장을 하나로 묶는 규칙</text>

  <!-- Box 3: IOSCO -->
  <rect x="340" y="345" width="230" height="80" rx="6" fill="#FFFFFF" stroke="#011E51" stroke-width="1.5"/>
  <text x="455" y="370" font-family="NanumGothic, sans-serif" font-size="15" fill="#011E51" font-weight="bold" text-anchor="middle">IOSCO 2012 원칙 규제</text>
  <text x="455" y="395" font-family="NanumGothic, sans-serif" font-size="12" fill="#727171" text-anchor="middle">벤치마크의 조작 위험 등 통제</text>
  <text x="455" y="410" font-family="NanumGothic, sans-serif" font-size="12" fill="#727171" text-anchor="middle">데이터 산출 거버넌스 및 정책 감사</text>

  <!-- ~~~~~~~~~~~ COLUMN 3: 현재 벤치마크 ~~~~~~~~~~~ -->
  <!-- Box 1: Brent -->
  <rect x="660" y="145" width="250" height="80" rx="6" fill="#FFFFFF" stroke="#F21B2D" stroke-width="1.5"/>
  <text x="785" y="165" font-family="NanumGothic, sans-serif" font-size="15" fill="#F21B2D" font-weight="bold" text-anchor="middle">Brent (유럽·글로벌 수입 지표)</text>
  <text x="670" y="185" font-family="NanumGothic, sans-serif" font-size="11" fill="#727171">▪ 평가 주도 :</text>
  <text x="735" y="185" font-family="NanumGothic, sans-serif" font-size="11" fill="#000000" font-weight="bold">Platts (현물) + ICIS (정산 데이터)</text>
  <text x="670" y="202" font-family="NanumGothic, sans-serif" font-size="11" fill="#727171">▪ 핵심 방법 :</text>
  <text x="735" y="202" font-family="NanumGothic, sans-serif" font-size="11" fill="#000000" font-weight="bold">BFOET 해상 인도 + MOC 윈도우</text>
  <text x="670" y="219" font-family="NanumGothic, sans-serif" font-size="11" fill="#727171">▪ 주력 파생 :</text>
  <text x="735" y="219" font-family="NanumGothic, sans-serif" font-size="11" fill="#000000" font-weight="bold">ICE Brent 선물 (금융 결제 실물교환)</text>

  <!-- Box 2: WTI -->
  <rect x="660" y="245" width="250" height="80" rx="6" fill="#FFFFFF" stroke="#F21B2D" stroke-width="1.5"/>
  <text x="785" y="265" font-family="NanumGothic, sans-serif" font-size="15" fill="#F21B2D" font-weight="bold" text-anchor="middle">WTI (서부텍사스산 대륙 지표)</text>
  <text x="670" y="285" font-family="NanumGothic, sans-serif" font-size="11" fill="#727171">▪ 평가 주도 :</text>
  <text x="735" y="285" font-family="NanumGothic, sans-serif" font-size="11" fill="#000000" font-weight="bold">Argus 주도 (수출/실물 시장 연동)</text>
  <text x="670" y="302" font-family="NanumGothic, sans-serif" font-size="11" fill="#727171">▪ 핵심 방법 :</text>
  <text x="735" y="302" font-family="NanumGothic, sans-serif" font-size="11" fill="#000000" font-weight="bold">육상 파이프라인 인도 및 가중평가</text>
  <text x="670" y="319" font-family="NanumGothic, sans-serif" font-size="11" fill="#727171">▪ 주력 파생 :</text>
  <text x="735" y="319" font-family="NanumGothic, sans-serif" font-size="11" fill="#000000" font-weight="bold">NYMEX WTI 선물 (실물 인수도)</text>

  <!-- Box 3: Dubai/Oman -->
  <rect x="660" y="345" width="250" height="80" rx="6" fill="#FFFFFF" stroke="#F21B2D" stroke-width="1.5"/>
  <text x="785" y="365" font-family="NanumGothic, sans-serif" font-size="15" fill="#F21B2D" font-weight="bold" text-anchor="middle">Dubai / Oman 연합 (아시아)</text>
  <text x="670" y="385" font-family="NanumGothic, sans-serif" font-size="11" fill="#727171">▪ 평가 주도 :</text>
  <text x="735" y="385" font-family="NanumGothic, sans-serif" font-size="11" fill="#000000" font-weight="bold">Platts (Dubai) &amp; DME (Oman 기준)</text>
  <text x="670" y="402" font-family="NanumGothic, sans-serif" font-size="11" fill="#727171">▪ 핵심 방법 :</text>
  <text x="735" y="402" font-family="NanumGothic, sans-serif" font-size="11" fill="#000000" font-weight="bold">중동국가 OSP 공시가와 현선물 링크</text>
  <text x="670" y="419" font-family="NanumGothic, sans-serif" font-size="11" fill="#727171">▪ 주력 파생 :</text>
  <text x="735" y="419" font-family="NanumGothic, sans-serif" font-size="11" fill="#000000" font-weight="bold">DME Oman 선물 및 각종 장기계약</text>

  <!-- Footer -->
  <text x="920" y="480" font-family="NanumGothic, sans-serif" font-size="12" fill="#727171" text-anchor="end">자료: 코리아PDS 정리 (벤치마크 형성과 역할 종합)</text>
</svg>
